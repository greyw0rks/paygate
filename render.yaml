services:
  - type: web
    name: paygate-agent
    runtime: node
    buildCommand: npm install && npm run build --workspace=packages/agent
    startCommand: node packages/agent/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HEDERA_ACCOUNT_ID
        sync: false
      - key: HEDERA_PRIVATE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: HEDERA_AUDIT_TOPIC_ID
        sync: false
